<VirtualHost *:80>
    ServerName churrasqueriarodeo.alexawebservers.com
    ServerAlias *.alexawebservers.com
    UseCanonicalName Off

    ProxyRequests Off
    ProxyPreserveHost On
    ProxyPass / http://127.0.0.1:3100/
    ProxyPassReverse / http://127.0.0.1:3100/

    ErrorLog /var/log/apache2/rake-cms-error.log
    CustomLog /var/log/apache2/rake-cms-access.log combined
</VirtualHost>

<VirtualHost *:443>
    ServerName churrasqueriarodeo.alexawebservers.com
    ServerAlias *.alexawebservers.com
    UseCanonicalName Off

    ProxyRequests Off
    ProxyPreserveHost On
    ProxyPass / http://127.0.0.1:3100/
    ProxyPassReverse / http://127.0.0.1:3100/

    SSLEngine on
    SSLCertificateFile /etc/ssl/virtualmin/17798083781525566/ssl.cert
    SSLCertificateKeyFile /etc/ssl/virtualmin/17798083781525566/ssl.key
    SSLCACertificateFile /etc/ssl/virtualmin/17798083781525566/ssl.ca
    SSLProtocol all -SSLv2 -SSLv3 -TLSv1 -TLSv1.1

    ErrorLog /var/log/apache2/rake-cms-error.log
    CustomLog /var/log/apache2/rake-cms-access.log combined
</VirtualHost>
