<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="bg2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d0d;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#1a0f0a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0d0d0d;stop-opacity:1"/>
    </linearGradient>
    <radialGradient id="glow3" cx="50%" cy="30%" r="50%">
      <stop offset="0%" style="stop-color:#D4A017;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#D4A017;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glow4" cx="20%" cy="70%" r="40%">
      <stop offset="0%" style="stop-color:#8B1A1A;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#8B1A1A;stop-opacity:0"/>
    </radialGradient>
    <pattern id="grid2" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#D4A017" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="1920" height="1080" fill="url(#bg2)"/>
  <rect width="1920" height="1080" fill="url(#glow3)"/>
  <rect width="1920" height="1080" fill="url(#glow4)"/>
  <rect width="1920" height="1080" fill="url(#grid2)"/>

  <!-- Decorative wine glass silhouette -->
  <g transform="translate(960, 520) scale(0.7)" opacity="0.05">
    <path d="M0-80 C20-80 35-60 35-35 C35-15 20 0 10 10 L10 40 L-10 40 L-10 10 C-20 0 -35 -15 -35 -35 C-35 -60 -20 -80 0 -80 Z" fill="#D4A017" stroke="#D4A017" stroke-width="1"/>
    <path d="M-8 40 L8 40 L6 55 L-6 55 Z" fill="#D4A017"/>
    <rect x="-10" y="55" width="20" height="5" rx="2" fill="#D4A017"/>
  </g>
</svg>
