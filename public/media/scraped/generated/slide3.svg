<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" style="stop-color:#1a0a0a;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#2d1a0a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1a0a0a;stop-opacity:1"/>
    </linearGradient>
    <radialGradient id="glow5" cx="30%" cy="30%" r="40%">
      <stop offset="0%" style="stop-color:#5C164E;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#5C164E;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glow6" cx="70%" cy="70%" r="50%">
      <stop offset="0%" style="stop-color:#D4A017;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#D4A017;stop-opacity:0"/>
    </radialGradient>
    <pattern id="stars3" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="30" r="0.8" fill="#D4A017" opacity="0.1"/>
      <circle cx="70" cy="70" r="1.2" fill="#D4A017" opacity="0.07"/>
      <circle cx="50" cy="15" r="0.5" fill="#FFFFFF" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="1920" height="1080" fill="url(#bg3)"/>
  <rect width="1920" height="1080" fill="url(#glow5)"/>
  <rect width="1920" height="1080" fill="url(#glow6)"/>
  <rect width="1920" height="1080" fill="url(#stars3)"/>

  <!-- Decorative plate silhouette -->
  <g transform="translate(960, 540) scale(0.5)" opacity="0.05">
    <ellipse cx="0" cy="0" rx="120" ry="120" fill="none" stroke="#D4A017" stroke-width="2"/>
    <ellipse cx="0" cy="0" rx="90" ry="90" fill="none" stroke="#D4A017" stroke-width="1" opacity="0.5"/>
    <ellipse cx="0" cy="0" rx="40" ry="40" fill="none" stroke="#D4A017" stroke-width="0.5" opacity="0.3"/>
  </g>
</svg>
