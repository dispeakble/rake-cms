<svg xmlns="http://www.w3.org/2000/svg" width="200" height="60" viewBox="0 0 200 60">
  <defs>
    <linearGradient id="logoBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5C164E;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#8B1A1A;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="goldTxt" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E5A100;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#D4A017;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <!-- Fork + Knife icon -->
  <g transform="translate(8, 12)">
    <!-- Fork -->
    <path d="M8 0 C10 0 11 2 11 5 L11 20 L9 20 L9 5 C9 3 8.5 2 8 2 L7 2 L7 20 L5 20 L5 2 L4 2 C3.5 2 3 3 3 5 L3 20 L1 20 L1 5 C1 2 2 0 4 0 Z" fill="url(#goldTxt)"/>
    <!-- Knife -->
    <path d="M18 0 C20 2 20 8 18 14 L16 20 L14 20 L16 12 C14 8 14 2 18 0 Z" fill="url(#goldTxt)"/>
  </g>
  <!-- Text -->
  <text x="48" y="30" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#FFFFFF">RESTAURANTE</text>
  <text x="48" y="46" font-family="Georgia, serif" font-size="11" fill="url(#goldTxt)">Casa Adolfo</text>
  <!-- Since 1975 badge -->
  <line x1="48" y1="19" x2="155" y2="19" stroke="#E5A100" stroke-width="0.5" opacity="0.5"/>
  <text x="120" y="16" font-family="Georgia, serif" font-size="6" fill="#E5A100" opacity="0.7">EST. 1975</text>
</svg>
